<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Гравитация - Московская область</title>
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22%D0%93%D1%80%D0%B0%D0%B2%D0%B8%D1%82%D0%B0%D1%86%D0%B8%D1%8F%20-%20%D0%9C%D0%9E%22%2C%22short_name%22%3A%22%D0%93%D1%80%D0%B0%D0%B2%D0%B8%D1%82%D0%B0%D1%86%D0%B8%D1%8F%22%2C%22start_url%22%3A%22%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23001a3b%22%2C%22theme_color%22%3A%22%23001a3b%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20192%20192'%3E%3Crect%20width='192'%20height='192'%20fill='%23001a3b'/%3E%3Ctext%20x='50%25'%20y='50%25'%20font-size='120'%20text-anchor='middle'%20dy='.3em'%20fill='%23ffffff'%3EG%3C/text%3E%3C/svg%3E%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image/svg+xml%22%7D%5D%7D">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background: linear-gradient(135deg, #001a3b 0%, #002b5c 100%); min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; color: white; }
        #app { width: 100%; max-width: 450px; min-height: 100vh; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); box-shadow: 0 0 40px rgba(0, 0, 0, 0.3); position: relative; overflow-x: hidden; display: flex; flex-direction: column; }
        @keyframes floatIn { 0% { opacity: 0; transform: translateY(100px) scale(0.9); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes rotateGlow { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .splash-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; text-align: center; position: relative; overflow: hidden; justify-content: flex-start; padding-top: 20vh; }
        @media (max-height: 700px) { .splash-screen { padding-top: 12vh; } }
        .gravity-text { font-family: 'Inter', sans-serif; font-size: 3rem; font-weight: 700; letter-spacing: -0.02em; background: linear-gradient(135deg, #FFFFFF 0%, #D4E6FF 40%, #9AC2FF 100%); background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: 0 8px 24px rgba(0, 100, 255, 0.35); margin-bottom: 12px; animation: floatIn 1.2s cubic-bezier(0.2, 0.9, 0.3, 1) forwards; position: relative; }
        .gravity-text::before { content: ''; position: absolute; top: -20px; left: -20px; right: -20px; bottom: -20px; background: radial-gradient(circle at center, rgba(154, 194, 255, 0.25) 0%, transparent 70%); animation: rotateGlow 12s linear infinite; z-index: -1; border-radius: 50%; }
        .region-text { font-size: 1.6rem; font-weight: 500; letter-spacing: 1.5px; color: rgba(255, 255, 255, 0.9); border-bottom: 1.5px solid rgba(255, 255, 255, 0.3); padding-bottom: 12px; display: inline-block; opacity: 0; animation: slideUp 0.8s 0.5s forwards; }
        .auth-buttons { display: flex; gap: 16px; justify-content: center; margin-top: 32px; opacity: 0; animation: slideUp 0.8s 0.8s forwards; width: 100%; max-width: 280px; }
        .auth-btn { flex: 1; background: linear-gradient(45deg, #0072ff, #00c6ff); border: none; color: white; font-size: 1.2rem; font-weight: 600; padding: 14px 0; border-radius: 60px; box-shadow: 0 10px 25px rgba(0, 114, 255, 0.4); cursor: pointer; transition: transform 0.25s ease, box-shadow 0.25s ease; border: 1px solid rgba(255,255,255,0.25); }
        .auth-btn:active { transform: scale(0.96); }
        .community-stats { margin-top: auto; margin-bottom: 20px; font-size: 0.85rem; font-weight: normal; color: rgba(255, 255, 255, 0.7); background: rgba(0,0,0,0.2); padding: 8px 16px; border-radius: 30px; backdrop-filter: blur(8px); animation: slideUp 0.8s 1s forwards; opacity: 0; text-align: center; line-height: 1.4; width: 90%; max-width: 320px; }
        .main-content { flex: 1; display: none; flex-direction: column; padding-bottom: 70px; }
        .main-content.active { display: flex; animation: slideUp 0.5s forwards; }
        .header { display: flex; justify-content: space-between; align-items: center; margin: 16px 20px 10px 20px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .header h1 { font-size: 1.8rem; background: linear-gradient(135deg, #fff, #a8d0ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logout-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 8px 15px; border-radius: 20px; font-size: 0.9rem; cursor: pointer; }
        .top-nav { display: flex; flex-wrap: nowrap; justify-content: space-between; gap: 6px; padding: 10px 12px; background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(255,255,255,0.1); overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .top-nav::-webkit-scrollbar { display: none; }
        .top-nav button { flex: 1; display: inline-flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; background: rgba(255,255,255,0.1); border: none; color: white; padding: 8px 4px; border-radius: 24px; font-size: 0.7rem; font-weight: 500; cursor: pointer; transition: all 0.2s; backdrop-filter: blur(4px); white-space: nowrap; text-align: center; min-width: 0; }
        .top-nav button span:first-child { font-size: 1.3rem; }
        .top-nav button.active { background: linear-gradient(45deg, #0072ff, #00c6ff); box-shadow: 0 2px 8px rgba(0,114,255,0.4); }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; max-width: 450px; margin: 0 auto; background: rgba(10, 25, 47, 0.95); backdrop-filter: blur(12px); display: flex; justify-content: space-around; align-items: center; padding: 8px 12px 12px; border-top: 1px solid rgba(255,255,255,0.15); z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; background: transparent; border: none; color: rgba(255,255,255,0.6); font-size: 0.7rem; font-weight: 500; cursor: pointer; transition: all 0.2s; padding: 6px 8px; border-radius: 30px; }
        .nav-item span:first-child { font-size: 1.4rem; }
        .nav-item.active { color: #00c6ff; background: rgba(0, 114, 255, 0.2); }
        .tab-content { display: none; background: rgba(255,255,255,0.05); border-radius: 20px; padding: 20px; backdrop-filter: blur(5px); margin: 10px 16px 0 16px; flex: 1; }
        .tab-content.active { display: block; }
        .search-container { margin-bottom: 20px; }
        .search-input { width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 40px; color: white; font-size: 1rem; outline: none; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: rgba(255,255,255,0.8); }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 15px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 15px; color: white; font-size: 1rem; }
        .strength-item, .skill-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 10px; }
        .dynamic-input { background: transparent; border: none; border-bottom: 1px dashed rgba(255,255,255,0.4); color: white; font-size: 1rem; padding: 5px 0; width: 100%; outline: none; }
        .add-btn { background: rgba(255,255,255,0.2); border: 1px dashed rgba(255,255,255,0.5); color: white; padding: 12px; border-radius: 15px; width: 100%; font-size: 1rem; cursor: pointer; margin-bottom: 10px; }
        .checkbox-label { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; cursor: pointer; font-size: 0.95rem; line-height: 1.3; }
        .checkbox-label input[type="checkbox"] { appearance: none; -webkit-appearance: none; width: 22px; height: 22px; background: rgba(255,255,255,0.1); border: 1.5px solid rgba(255,255,255,0.4); border-radius: 6px; cursor: pointer; position: relative; transition: all 0.2s ease; flex-shrink: 0; margin: 0; }
        .checkbox-label input[type="checkbox"]:checked { background: linear-gradient(45deg, #0072ff, #00c6ff); border-color: #00c6ff; }
        .checkbox-label input[type="checkbox"]:checked::after { content: "✓"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 14px; font-weight: bold; }
        .checkbox-label label { cursor: pointer; color: rgba(255,255,255,0.9); font-size: 0.95rem; line-height: 1.3; }
        .save-btn { background: linear-gradient(45deg, #00c6ff, #0072ff); border: none; color: white; padding: 15px; border-radius: 30px; width: 100%; font-size: 1.2rem; font-weight: 600; cursor: pointer; margin-top: 20px; }
        .directors-grid { display: flex; flex-direction: column; gap: 20px; }
        .director-card { background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(12px); border-radius: 28px; padding: 18px; border: 1px solid rgba(255,255,255,0.15); }
        .card-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .avatar-img, .avatar-placeholder { width: 70px; height: 70px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 600; color: white; background: linear-gradient(135deg, #0072ff, #00c6ff); }
        .avatar-img { background: none; object-fit: cover; }
        .photo-preview { margin-top: 12px; text-align: center; }
        .photo-preview img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 2px solid rgba(255,255,255,0.3); }
        .badge-mentor { background: #ffaa33; color: #1e2a3a; font-size: 0.7rem; padding: 2px 8px; border-radius: 30px; font-weight: bold; }
        .info-section { margin: 12px 0; background: rgba(255,255,255,0.05); border-radius: 18px; padding: 12px; }
        .info-section h4 { font-size: 0.85rem; color: #9ac2ff; margin-bottom: 8px; }
        .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px; }
        .tag { background: rgba(0,114,255,0.3); border-radius: 20px; padding: 4px 12px; font-size: 0.75rem; }
        .contact-btn, .detail-btn { background: linear-gradient(45deg, #0072ff, #00c6ff); border: none; color: white; padding: 10px; border-radius: 40px; width: 100%; margin-top: 12px; cursor: pointer; }
        .detail-btn { background: rgba(255,255,255,0.2); }
        .event-card { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; margin-bottom: 15px; border-left: 4px solid #0072ff; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(12px); display: flex; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .modal-content { max-width: 400px; width: 100%; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(16px); border-radius: 40px; border: 1px solid rgba(255, 255, 255, 0.2); padding: 24px; color: white; max-height: 90vh; overflow-y: auto; }
        .close-modal { float: right; background: rgba(255,255,255,0.2); border: none; color: white; font-size: 24px; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; }
        .install-prompt { background: rgba(0, 26, 59, 0.95); backdrop-filter: blur(10px); padding: 15px; border-radius: 15px; margin: 10px; display: flex; justify-content: space-between; align-items: center; }
        .new-section-card { background: rgba(255,255,255,0.08); border-radius: 24px; padding: 20px; margin-bottom: 20px; border-left: 4px solid #00c6ff; }
        .new-section-card h3 { margin-bottom: 12px; color: #00c6ff; }
        .rating-badge { display: inline-block; background: rgba(0,198,255,0.2); border-radius: 30px; padding: 4px 12px; font-size: 0.75rem; margin-top: 8px; border: 1px solid rgba(0,198,255,0.5); }
        .activity-item { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 8px 12px; margin-bottom: 8px; font-size: 0.8rem; }
        .admin-table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        .admin-table th, .admin-table td { padding: 8px; border-bottom: 1px solid rgba(255,255,255,0.2); text-align: left; }
        /* Дополнительные стили для модального окна (детальная карточка) */
        .strength-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 12px; }
        .strength-name { font-weight: 500; min-width: 140px; }
        .strength-bar { flex: 1; height: 8px; background: rgba(255,255,255,0.2); border-radius: 10px; overflow: hidden; }
        .strength-fill { height: 100%; background: linear-gradient(90deg, #00c6ff, #0072ff); border-radius: 10px; width: 0%; }
        .strength-value { font-size: 0.8rem; font-weight: 600; min-width: 36px; text-align: right; color: #aad0ff; }
        .skill-item-compact { display: flex; justify-content: space-between; align-items: baseline; border-bottom: 1px dashed rgba(255,255,255,0.2); padding: 8px 0; }
        .skill-level { background: rgba(0,114,255,0.5); padding: 2px 10px; border-radius: 30px; font-size: 0.7rem; font-weight: 600; }
        .interests-line { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
        .interest-badge { background: rgba(255,255,240,0.12); border-radius: 30px; padding: 5px 14px; font-size: 0.8rem; }
        .detail-tag { background: rgba(0, 114, 255, 0.35); border-radius: 40px; padding: 6px 16px; font-size: 0.8rem; font-weight: 500; display: inline-block; margin-right: 8px; margin-bottom: 8px; }
        @media (max-width: 450px) { .gravity-text { font-size: 2.5rem; } .region-text { font-size: 1.3rem; } .top-nav button { padding: 6px 2px; font-size: 0.65rem; } .top-nav button span:first-child { font-size: 1.1rem; } .nav-item span:first-child { font-size: 1.2rem; } .nav-item { font-size: 0.6rem; padding: 4px 6px; } .avatar-img, .avatar-placeholder { width: 55px; height: 55px; font-size: 22px; } }
    </style>
</head>
<body>
<div id="app">
    <div class="splash-screen" id="splashScreen">
        <div><div class="gravity-text">Гравитация</div><div class="region-text">Московская область</div></div>
        <div class="auth-buttons"><button class="auth-btn" id="loginBtn">Вход</button><button class="auth-btn" id="registerBtn">Регистрация</button></div>
        <div class="install-prompt" id="installPrompt" style="display: none;"><span>📱 Установить приложение</span><button id="installBtn">Установить</button></div>
        <div class="community-stats">Гравитация – профессиональное сообщество директоров нас: <span>287</span></div>
    </div>
    <div class="main-content" id="mainContent">
        <div class="header"><h1>Гравитация</h1><button class="logout-btn" id="logoutBtn">Выйти</button></div>
        <div class="top-nav" id="topNav">
            <button data-tab="profile"><span>👤</span> <span>Профиль</span></button>
            <button data-tab="school"><span>🏫</span> <span>Школа</span></button>
            <button data-tab="events"><span>📅</span> <span>Мероприятия</span></button>
            <button data-tab="directors"><span>🧑‍💼</span> <span>Директора</span></button>
            <button data-tab="mentors"><span>🌟</span> <span>Наставники</span></button>
        </div>
        <div class="tab-content" id="profile"></div>
        <div class="tab-content" id="school"></div>
        <div class="tab-content" id="events"></div>
        <div class="tab-content" id="directors"></div>
        <div class="tab-content" id="mentors"></div>
        <div class="bottom-nav" id="bottomNav">
            <button class="nav-item" data-newtab="expert"><span>📊</span><span>Экспертное мнение</span></button>
            <button class="nav-item" data-newtab="gl"><span>⭐</span><span>ГЛ</span></button>
            <button class="nav-item" data-newtab="internship"><span>🎓</span><span>Стажировка</span></button>
            <button class="nav-item" data-newtab="calendar"><span>📅</span><span>Календарь мероприятий</span></button>
            <button class="nav-item admin-only" id="adminNavBtn" data-newtab="admin" style="display:none;"><span>👑</span><span>Админ</span></button>
        </div>
        <div class="tab-content" id="expert"></div>
        <div class="tab-content" id="gl"></div>
        <div class="tab-content" id="internship"></div>
        <div class="tab-content" id="calendar"></div>
        <div class="tab-content" id="admin"></div>
    </div>
</div>
<script>
    // ---------- ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ----------
    function escapeHtml(str) { return str?.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}) || ''; }
    function showModal(title, contentHtml) {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.innerHTML = `<div class="modal-content"><button class="close-modal">&times;</button><h2 style="margin-bottom: 20px;">${title}</h2>${contentHtml}</div>`;
        document.body.appendChild(overlay);
        overlay.querySelector('.close-modal').onclick = () => overlay.remove();
        overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
        return overlay;
    }
    function getCurrentUserEmail() { const cu = localStorage.getItem('currentUser'); return cu ? JSON.parse(cu).email : null; }
    function isAdmin() { return getCurrentUserEmail() === 'admin@gravitacia.ru'; }
    function getCurrentDirectorName() { const p = localStorage.getItem('directorProfile'); return p ? (JSON.parse(p).name || 'Директор') : 'Директор'; }
    function getCurrentSchoolName() { const s = localStorage.getItem('schoolInfo'); return s ? (JSON.parse(s).name || 'Школа') : 'Школа'; }
    
    // ---------- СИСТЕМА РЕЙТИНГА ----------
    function initRatingSystem() {
        if (!localStorage.getItem('ratingsData')) localStorage.setItem('ratingsData', JSON.stringify({}));
        const users = JSON.parse(localStorage.getItem('users') || '[]');
        if (!users.some(u => u.email === 'admin@gravitacia.ru')) users.push({ name: 'Администратор', email: 'admin@gravitacia.ru', phone: '', password: 'admin123' });
        localStorage.setItem('users', JSON.stringify(users));
        const ratings = JSON.parse(localStorage.getItem('ratingsData'));
        users.forEach(user => { if (!ratings[user.email]) ratings[user.email] = { totalScore: 0, public: false, activities: [] }; });
        localStorage.setItem('ratingsData', JSON.stringify(ratings));
    }
    function getRatingData(email) { const ratings = JSON.parse(localStorage.getItem('ratingsData') || '{}'); return ratings[email] || { totalScore: 0, public: false, activities: [] }; }
    function saveRatingData(email, data) { const ratings = JSON.parse(localStorage.getItem('ratingsData') || '{}'); ratings[email] = data; localStorage.setItem('ratingsData', JSON.stringify(ratings)); }
    function addRatingActivity(email, type, description, points) { if (!email) return; const data = getRatingData(email); data.totalScore += points; data.activities = data.activities || []; data.activities.unshift({ type, description, points, date: new Date().toLocaleString() }); if (data.activities.length > 20) data.activities.pop(); saveRatingData(email, data); return data.totalScore; }
    function canViewRating(ownerEmail, viewerEmail) { if (viewerEmail === ownerEmail) return true; if (isAdmin()) return true; return getRatingData(ownerEmail).public === true; }
    
    // ---------- МЕРОПРИЯТИЯ ----------
    let events = [];
    function loadEventsFromStorage() { const stored = localStorage.getItem('events'); events = stored ? JSON.parse(stored) : []; }
    function saveEventsToStorage() { localStorage.setItem('events', JSON.stringify(events)); }
    function createEvent(title, date, description, maxParticipants, isSpeaker = false) {
        const email = getCurrentUserEmail();
        const event = { id: Date.now(), title, date, description, max: parseInt(maxParticipants) || 999, registrations: [], creator: getCurrentDirectorName(), creatorSchool: getCurrentSchoolName(), creatorEmail: email };
        events.push(event);
        saveEventsToStorage();
        if (email) {
            addRatingActivity(email, 'create_event', `Создал мероприятие "${title}"`, 10);
            if (isSpeaker) addRatingActivity(email, 'speaker', `Выступил спикером на "${title}"`, 15);
        }
        renderEvents();
    }
    window.registerForEvent = function(eventId) {
        const ev = events.find(e => e.id == eventId);
        if (!ev) return;
        if (ev.registrations.length >= ev.max) { alert('Максимум участников'); return; }
        const employeeName = prompt('ФИО сотрудника:'); if (!employeeName) return;
        const position = prompt('Должность:'); if (!position) return;
        const school = prompt('От какой школы?', getCurrentSchoolName()); if (!school) return;
        ev.registrations.push({ employeeName, position, schoolName: school, registeredAt: new Date().toLocaleString() });
        saveEventsToStorage();
        renderEvents();
        const email = getCurrentUserEmail();
        if (email) addRatingActivity(email, 'participation', `Зарегистрировал ${employeeName} на "${ev.title}"`, 2);
        alert(`Сотрудник ${employeeName} записан`);
    };
    window.deleteEvent = function(eventId) {
        const ev = events.find(e => e.id == eventId);
        if (!ev || ev.creator !== getCurrentDirectorName()) { alert('Удалять можно только свои мероприятия'); return; }
        if (confirm('Удалить?')) { events = events.filter(e => e.id != eventId); saveEventsToStorage(); renderEvents(); }
    };
    function renderEvents() {
        const container = document.getElementById('eventsList');
        if (!container) return;
        if (events.length === 0) { container.innerHTML = '<div style="text-align:center; padding:20px;">Нет мероприятий. Создайте первое!</div>'; return; }
        let html = '';
        events.forEach(ev => {
            const isCreator = (ev.creator === getCurrentDirectorName());

<script>
    (function() {
        const glEventsData = [

            { id: 'int1', title: 'Стажировка в лучших школах МО', description: 'Возможность посетить школы-лидеры, перенять опыт. Ближайшая стажировка: 15–17 мая.', date: '15–17 мая' },

            { id: 'int3', title: 'Заявка на стажировку', description: 'Оставьте заявку в личном кабинете, и мы подберём подходящую программу.', date: 'По запросу' }
        ];
        const calendarEventsData = [
            { id: 'cal1', title: 'Вебинар «Эффективное бюджетирование»', description: 'Спикер: Елена Громова, директор гимназии №11. Регистрация в разделе «Мероприятия».', date: '12 апреля' },
            { id: 'cal2', title: 'Форум «Лидеры образования Подмосковья»', description: 'Очный форум в Химках. Участие бесплатное по предварительной записи.', date: '25 апреля' },

            const data = localStorage.getItem(key);
            return data ? JSON.parse(data) : {};

        function saveRegistrations(key, registrations) {
            localStorage.setItem(key, JSON.stringify(registrations));
        }

        function registerForEvent(category, eventId, eventTitle) {
            const currentUser = localStorage.getItem('currentUser');
            if (!currentUser) {
                alert('Необходимо авторизоваться');
                return;
            }
            const user = JSON.parse(currentUser);
            const schoolInfo = localStorage.getItem('schoolInfo');

            const position = prompt('Должность:', 'Директор');

            const school = prompt('От какой школы?', schoolName);

            const registrations = loadRegistrations(STORAGE_KEYS[category]);

                employeeName,
                position,
                schoolName: school,
                registeredAt: new Date().toLocaleString(),
                registeredBy: user.email

            if (window.addRatingActivity) {

            else if (category === 'calendar') renderCalendar();

                    </div>
                `;
            });
            container.innerHTML = html;
        }

            const container = document.getElementById('internship');
            if (!container) return;
            const registrations = loadRegistrations(STORAGE_KEYS.internship);

                const eventRegs = registrations[event.id] || [];
                html += `
                    <div class="new-section-card">
                        <h3>${escapeHtml(event.title)}</h3>
                        <p>📅 ${escapeHtml(event.date)}</p>
                        <p>${escapeHtml(event.description)}</p>
                        <button class="save-btn" style="margin-top:10px; padding:8px;" onclick="window.registerForInternshipEvent('${event.id}', '${escapeHtml(event.title)}')">📝 Зарегистрироваться</button>
                        ${eventRegs.length ? `<div style="margin-top:12px;"><strong>Записавшиеся:</strong><ul>${eventRegs.map(r => `<li>${escapeHtml(r.employeeName)} (${escapeHtml(r.position)}) — ${escapeHtml(r.schoolName)}</li>`).join('')}</ul></div>` : ''}
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function renderCalendar() {
            const container = document.getElementById('calendar');
            if (!container) return;
            const registrations = loadRegistrations(STORAGE_KEYS.calendar);
            let html = `<h2>📅 Календарь мероприятий</h2>`;
            calendarEventsData.forEach(event => {
                const eventRegs = registrations[event.id] || [];
                html += `
                    <div class="new-section-card">
                        <h3>${escapeHtml(event.title)}</h3>
                        <p>📅 ${escapeHtml(event.date)}</p>
                        <p>${escapeHtml(event.description)}</p>
                        <button class="save-btn" style="margin-top:10px; padding:8px;" onclick="window.registerForCalendarEvent('${event.id}', '${escapeHtml(event.title)}')">📝 Зарегистрироваться</button>
                        ${eventRegs.length ? `<div style="margin-top:12px;"><strong>Записавшиеся:</strong><ul>${eventRegs.map(r => `<li>${escapeHtml(r.employeeName)} (${escapeHtml(r.position)}) — ${escapeHtml(r.schoolName)}</li>`).join('')}</ul></div>` : ''}
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        window.registerForGLEvent = (eventId, eventTitle) => registerForEvent('gl', eventId, eventTitle);
        window.registerForInternshipEvent = (eventId, eventTitle) => registerForEvent('internship', eventId, eventTitle);
        window.registerForCalendarEvent = (eventId, eventTitle) => registerForEvent('calendar', eventId, eventTitle);

        setTimeout(() => {
            renderGL();
            renderInternship();
            renderCalendar();
        }, 100);
    })();
</script>
</body>
</html>
