<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Гравитация - Московская область</title>
    <link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22%D0%93%D1%80%D0%B0%D0%B2%D0%B8%D1%82%D0%B0%D1%86%D0%B8%D1%8F%20-%20%D0%9C%D0%9E%22%2C%22short_name%22%3A%22%D0%93%D1%80%D0%B0%D0%B2%D0%B8%D1%82%D0%B0%D1%86%D0%B8%D1%8F%22%2C%22start_url%22%3A%22%2F%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23001a3b%22%2C%22theme_color%22%3A%22%23001a3b%22%2C%22icons%22%3A%5B%7B%22src%22%3A%22data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20viewBox='0%200%20192%20192'%3E%3Crect%20width='192'%20height='192'%20fill='%23001a3b'/%3E%3Ctext%20x='50%25'%20y='50%25'%20font-size='120'%20text-anchor='middle'%20dy='.3em'%20fill='%23ffffff'%3EG%3C/text%3E%3C/svg%3E%22%2C%22sizes%22%3A%22192x192%22%2C%22type%22%3A%22image/svg+xml%22%7D%5D%7D">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #001a3b 0%, #002b5c 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            color: white;
        }

        #app {
            width: 100%;
            max-width: 450px;
            min-height: 100vh;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        @keyframes floatIn {
            0% { opacity: 0; transform: translateY(100px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes rotateGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .splash-screen {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
            justify-content: flex-start;
            padding-top: 20vh;
        }
        
        @media (max-height: 700px) {
            .splash-screen {
                padding-top: 12vh;
            }
        }
        
        .gravity-text {
            font-family: 'Inter', sans-serif;
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #FFFFFF 0%, #D4E6FF 40%, #9AC2FF 100%);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 8px 24px rgba(0, 100, 255, 0.35);
            margin-bottom: 12px;
            animation: floatIn 1.2s cubic-bezier(0.2, 0.9, 0.3, 1) forwards;
            position: relative;
        }
        .gravity-text::before {
            content: '';
            position: absolute;
            top: -20px;
            left: -20px;
            right: -20px;
            bottom: -20px;
            background: radial-gradient(circle at center, rgba(154, 194, 255, 0.25) 0%, transparent 70%);
            animation: rotateGlow 12s linear infinite;
            z-index: -1;
            border-radius: 50%;
        }
        .region-text {
            font-size: 1.6rem;
            font-weight: 500;
            letter-spacing: 1.5px;
            color: rgba(255, 255, 255, 0.9);
            border-bottom: 1.5px solid rgba(255, 255, 255, 0.3);
            padding-bottom: 12px;
            display: inline-block;
            opacity: 0;
            animation: slideUp 0.8s 0.5s forwards;
        }
        .auth-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 32px;
            opacity: 0;
            animation: slideUp 0.8s 0.8s forwards;
            width: 100%;
            max-width: 280px;
        }
        .auth-btn {
            flex: 1;
            background: linear-gradient(45deg, #0072ff, #00c6ff);
            border: none;
            color: white;
            font-size: 1.2rem;
            font-weight: 600;
            padding: 14px 0;
            border-radius: 60px;
            box-shadow: 0 10px 25px rgba(0, 114, 255, 0.4);
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            border: 1px solid rgba(255,255,255,0.25);
        }
        .auth-btn:active { transform: scale(0.96); }

        .community-stats {
            margin-top: auto;
            margin-bottom: 20px;
            font-size: 0.85rem;
            font-weight: normal;
            color: rgba(255, 255, 255, 0.7);
            background: rgba(0,0,0,0.2);
            padding: 8px 16px;
            border-radius: 30px;
            backdrop-filter: blur(8px);
            animation: slideUp 0.8s 1s forwards;
            opacity: 0;
            text-align: center;
            line-height: 1.4;
            width: 90%;
            max-width: 320px;
        }

        .main-content {
            flex: 1;
            display: none;
            flex-direction: column;
            padding-bottom: 70px;
        }
        .main-content.active { display: flex; animation: slideUp 0.5s forwards; }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 16px 20px 10px 20px;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }
        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #fff, #a8d0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logout-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            cursor: pointer;
        }

        /* Нижняя навигация */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 450px;
            margin: 0 auto;
            background: rgba(10, 25, 47, 0.95);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 12px 12px;
            border-top: 1px solid rgba(255,255,255,0.15);
            z-index: 100;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.6);
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            padding: 6px 12px;
            border-radius: 30px;
        }
        .nav-item span:first-child {
            font-size: 1.4rem;
        }
        .nav-item.active {
            color: #00c6ff;
            background: rgba(0, 114, 255, 0.2);
        }
        .tab-content {
            display: none;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 20px;
            backdrop-filter: blur(5px);
            margin: 10px 16px 0 16px;
            flex: 1;
        }
        .tab-content.active {
            display: block;
        }

        /* Общие стили для форм */
        .search-container { margin-bottom: 20px; }
        .search-input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            outline: none;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.8);
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 15px;
            color: white;
            font-size: 1rem;
        }
        .strength-item, .skill-item {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .dynamic-input {
            background: transparent;
            border: none;
            border-bottom: 1px dashed rgba(255,255,255,0.4);
            color: white;
            font-size: 1rem;
            padding: 5px 0;
            width: 100%;
            outline: none;
        }
        .add-btn {
            background: rgba(255,255,255,0.2);
            border: 1px dashed rgba(255,255,255,0.5);
            color: white;
            padding: 12px;
            border-radius: 15px;
            width: 100%;
            font-size: 1rem;
            cursor: pointer;
            margin-bottom: 10px;
        }
        /* Чекбоксы унифицированы как в index.html */
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            cursor: pointer;
            font-size: 0.95rem;
            line-height: 1.3;
        }
        .checkbox-label input[type="checkbox"] {
            appearance: none;
            -webkit-appearance: none;
            width: 22px;
            height: 22px;
            background: rgba(255,255,255,0.1);
            border: 1.5px solid rgba(255,255,255,0.4);
            border-radius: 6px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
            flex-shrink: 0;
            margin: 0;
        }
        .checkbox-label input[type="checkbox"]:checked {
            background: linear-gradient(45deg, #0072ff, #00c6ff);
            border-color: #00c6ff;
        }
        .checkbox-label input[type="checkbox"]:checked::after {
            content: "✓";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 14px;
            font-weight: bold;
        }
        .checkbox-label label {
            cursor: pointer;
            color: rgba(255,255,255,0.9);
            font-size: 0.95rem;
            line-height: 1.3;
        }
        .save-btn {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            border: none;
            color: white;
            padding: 15px;
            border-radius: 30px;
            width: 100%;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
        .directors-grid { display: flex; flex-direction: column; gap: 20px; }
        .director-card {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 18px;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        .avatar {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #0072ff, #00c6ff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 600;
            color: white;
        }
        .badge-mentor {
            background: #ffaa33;
            color: #1e2a3a;
            font-size: 0.7rem;
            padding: 2px 8px;
            border-radius: 30px;
            font-weight: bold;
        }
        .info-section {
            margin: 12px 0;
            background: rgba(255,255,255,0.05);
            border-radius: 18px;
            padding: 12px;
        }
        .info-section h4 { font-size: 0.85rem; color: #9ac2ff; margin-bottom: 8px; }
        .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 5px; }
        .tag {
            background: rgba(0,114,255,0.3);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.75rem;
        }
        .contact-btn, .detail-btn {
            background: linear-gradient(45deg, #0072ff, #00c6ff);
            border: none;
            color: white;
            padding: 10px;
            border-radius: 40px;
            width: 100%;
            margin-top: 12px;
            cursor: pointer;
        }
        .detail-btn { background: rgba(255,255,255,0.2); }
        .event-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            border-left: 4px solid #0072ff;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-content {
            max-width: 400px;
            width: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 24px;
            color: white;
        }
        .close-modal {
            float: right;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            font-size: 24px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
        }
        .strength-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            gap: 12px;
        }
        .strength-bar {
            flex: 1;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }
        .strength-fill {
            height: 100%;
            background: linear-gradient(90deg, #00c6ff, #0072ff);
            border-radius: 10px;
        }
        .install-prompt {
            background: rgba(0, 26, 59, 0.95);
            backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: 15px;
            margin: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        @media (max-width: 450px) {
            .gravity-text { font-size: 2.5rem; }
            .region-text { font-size: 1.3rem; }
            .nav-item span:first-child { font-size: 1.2rem; }
            .nav-item { font-size: 0.6rem; padding: 4px 8px; }
        }
    </style>
</head>
<body>
<div id="app">
    <!-- Экран приветствия -->
    <div class="splash-screen" id="splashScreen">
        <div>
            <div class="gravity-text">Гравитация</div>
            <div class="region-text">Московская область</div>
        </div>
        <div class="auth-buttons">
            <button class="auth-btn" id="loginBtn">Вход</button>
            <button class="auth-btn" id="registerBtn">Регистрация</button>
        </div>
        <div class="install-prompt" id="installPrompt" style="display: none;"><span>📱 Установить приложение</span><button id="installBtn">Установить</button></div>
        <div class="community-stats">
            Гравитация – профессиональное сообщество директоров нас: <span>287</span>
        </div>
    </div>

    <!-- Основной контент -->
    <div class="main-content" id="mainContent">
        <div class="header">
            <h1>Гравитация</h1>
            <button class="logout-btn" id="logoutBtn">Выйти</button>
        </div>

        <!-- Контейнеры для контента -->
        <div class="tab-content" id="profile"></div>
        <div class="tab-content" id="school"></div>
        <div class="tab-content" id="events"></div>
        <div class="tab-content" id="directors"></div>
        <div class="tab-content" id="mentors"></div>

        <!-- Нижняя навигация -->
        <div class="bottom-nav">
            <button class="nav-item" data-tab="profile"><span>👤</span><span>Профиль</span></button>
            <button class="nav-item" data-tab="school"><span>🏫</span><span>Школа</span></button>
            <button class="nav-item" data-tab="events"><span>📅</span><span>Мероприятия</span></button>
            <button class="nav-item" data-tab="directors"><span>🧑‍💼</span><span>Директора</span></button>
            <button class="nav-item" data-tab="mentors"><span>🌟</span><span>Наставники</span></button>
        </div>
    </div>
</div>

<script>
    // ---------- Авторизация и модальные окна ----------
    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        document.getElementById('installPrompt').style.display = 'flex';
    });
    document.getElementById('installBtn')?.addEventListener('click', async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        await deferredPrompt.userChoice;
        deferredPrompt = null;
        document.getElementById('installPrompt').style.display = 'none';
    });

    function showModal(title, contentHtml) {
        const overlay = document.createElement('div');
        overlay.className = 'modal-overlay';
        overlay.innerHTML = `
            <div class="modal-content">
                <button class="close-modal">&times;</button>
                <h2 style="margin-bottom: 20px;">${title}</h2>
                ${contentHtml}
            </div>
        `;
        document.body.appendChild(overlay);
        overlay.querySelector('.close-modal').onclick = () => overlay.remove();
        overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
        return overlay;
    }

    function showLoginModal() {
        const html = `
            <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="director@school.ru"></div>
            <div class="form-group"><label>Пароль</label><input type="password" id="loginPassword" placeholder="******"></div>
            <button class="save-btn" id="doLoginBtn">Войти</button>
        `;
        const modal = showModal('Вход в аккаунт', html);
        modal.querySelector('#doLoginBtn').onclick = () => {
            const email = modal.querySelector('#loginEmail').value.trim();
            const password = modal.querySelector('#loginPassword').value;
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            const user = users.find(u => u.email === email && u.password === password);
            if (user) {
                localStorage.setItem('userLoggedIn', 'true');
                localStorage.setItem('currentUser', JSON.stringify(user));
                modal.remove();
                showMainApp();
            } else {
                alert('Неверный email или пароль');
            }
        };
    }

    function showRegisterModal() {
        const html = `
            <div class="form-group"><label>ФИО</label><input type="text" id="regName" placeholder="Иванов Иван Иванович"></div>
            <div class="form-group"><label>Email</label><input type="email" id="regEmail" placeholder="director@school.ru"></div>
            <div class="form-group"><label>Телефон</label><input type="tel" id="regPhone" placeholder="+7 (999) 999-99-99"></div>
            <div class="form-group"><label>Пароль</label><input type="password" id="regPassword" placeholder="минимум 6 символов"></div>
            <button class="save-btn" id="doRegisterBtn">Зарегистрироваться</button>
        `;
        const modal = showModal('Регистрация', html);
        modal.querySelector('#doRegisterBtn').onclick = () => {
            const name = modal.querySelector('#regName').value.trim();
            const email = modal.querySelector('#regEmail').value.trim();
            const phone = modal.querySelector('#regPhone').value.trim();
            const password = modal.querySelector('#regPassword').value;
            if (!name || !email || !password) {
                alert('Заполните все поля');
                return;
            }
            if (password.length < 6) {
                alert('Пароль должен быть не менее 6 символов');
                return;
            }
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            if (users.some(u => u.email === email)) {
                alert('Пользователь с таким email уже существует');
                return;
            }
            const newUser = { name, email, phone, password };
            users.push(newUser);
            localStorage.setItem('users', JSON.stringify(users));
            localStorage.setItem('userLoggedIn', 'true');
            localStorage.setItem('currentUser', JSON.stringify(newUser));
            modal.remove();
            showMainApp();
        };
    }

    function showMainApp() {
        document.getElementById('splashScreen').style.display = 'none';
        const main = document.getElementById('mainContent');
        main.classList.add('active');
        initTabs();
        loadUserDataIntoForms();
        renderDirectors();
        renderEvents();
    }

    function logout() {
        localStorage.removeItem('userLoggedIn');
        localStorage.removeItem('currentUser');
        document.getElementById('splashScreen').style.display = 'flex';
        document.getElementById('mainContent').classList.remove('active');
    }

    // ========== ОБНОВЛЁННЫЙ ПРОФИЛЬ (HTML И ФУНКЦИИ) ==========
    // Устанавливаем содержимое вкладки профиля в точности как в index.html
    document.getElementById('profile').innerHTML = `
        <h2 style="margin-bottom: 20px;">Профиль директора</h2>
        <div class="form-group"><label>ФИО полностью</label><input type="text" id="directorName" placeholder="Иванов Иван Иванович"></div>
        <div class="form-group"><label>Email</label><input type="email" id="directorEmail" placeholder="director@school.ru"></div>
        <div class="form-group"><label>Телефон</label><input type="tel" id="directorPhone" placeholder="+7 (999) 999-99-99"></div>
        <h3 style="margin: 20px 0 10px;">Мои сильные стороны</h3><div id="strengthsList"></div><button class="add-btn" onclick="addStrength()">+ Добавить качество</button>
        <h3 style="margin: 20px 0 10px;">Профессиональные навыки</h3><div id="skillsList"></div><button class="add-btn" onclick="addSkill()">+ Добавить навык</button>
        <h3 style="margin: 20px 0 10px;">Уникальный опыт</h3><div class="form-group"><textarea id="uniqueExperience" rows="3" placeholder="Расскажите о вашем уникальном профессиональном опыте..."></textarea></div>
        <h3 style="margin: 20px 0 10px;">Личные интересы</h3><div class="form-group"><textarea id="personalInterests" rows="3" placeholder="Ваши хобби, увлечения и интересы..."></textarea></div>

    window.addStrength = function(name = '', val = 5) {
        const strengthsList = document.getElementById('strengthsList');
        const newDiv = document.createElement('div');
        newDiv.className = 'strength-item';
        newDiv.innerHTML = `<input type="text" class="dynamic-input strength-name" placeholder="Например: Стратегическое планирование..." value="${name}"><input type="range" class="strength-val" min="1" max="10" value="${val}">`;

    window.addSkill = function(name = '', level = 'Средний') {
        const skillsList = document.getElementById('skillsList');
        const newDiv = document.createElement('div');
        newDiv.className = 'skill-item';
        const options = ['Начальный', 'Средний', 'Продвинутый', 'Эксперт'].map(opt => `<option value="${opt}" ${opt === level ? 'selected' : ''}>${opt}</option>`).join('');
        newDiv.innerHTML = `<input type="text" class="dynamic-input skill-name" placeholder="Например: Цифровая трансформация..." value="${name}"><select class="skill-level" style="margin-top: 10px;">${options}</select>`;
        skillsList.appendChild(newDiv);
    };
    window.saveProfile = function() {
        const strengths = [];
        document.querySelectorAll('.strength-item').forEach(item => {
            const name = item.querySelector('.strength-name').value;
            const val = item.querySelector('.strength-val').value;
            if(name.trim()) strengths.push({ name, val });
        });
        const skills = [];
        document.querySelectorAll('.skill-item').forEach(item => {
            const name = item.querySelector('.skill-name').value;
            const level = item.querySelector('.skill-level').value;
            if(name.trim()) skills.push({ name, level });
        });
        const profileData = {
            name: document.getElementById('directorName').value,
            email: document.getElementById('directorEmail').value,
            phone: document.getElementById('directorPhone').value,
            experience: document.getElementById('uniqueExperience').value,
            interests: document.getElementById('personalInterests').value,
            isMentor: document.getElementById('mentorCheckbox').checked,
            consent: document.getElementById('consentCheckbox').checked,
            strengths: strengths,
            skills: skills
        };
        localStorage.setItem('directorProfile', JSON.stringify(profileData));
        alert('Профиль сохранён!');
        renderDirectors();
    };

        function switchTab(tabId) {
            contents.forEach(c => c.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            navItems.forEach(item => {
                if (item.getAttribute('data-tab') === tabId) item.classList.add('active');
                else item.classList.remove('active');
            });
            if (tabId === 'directors') renderDirectors();
            if (tabId === 'events') renderEvents();
            if (tabId === 'mentors') renderMentors();
        }
        navItems.forEach(item => {
            item.addEventListener('click', () => switchTab(item.getAttribute('data-tab')));
        });

    window.registerForEvent = function(eventId) {
        const ev = events.find(e => e.id == eventId);
        if (!ev) return;
        if (ev.registrations.length >= ev.max) { alert('Максимум участников'); return; }
        const employeeName = prompt('ФИО сотрудника:'); if (!employeeName) return;
        const position = prompt('Должность:'); if (!position) return;
        const school = prompt('От какой школы?', getCurrentSchoolName()); if (!school) return;
        ev.registrations.push({ employeeName, position, schoolName: school, registeredAt: new Date().toLocaleString() });
        saveEventsToStorage();
        renderEvents();
        alert(`Сотрудник ${employeeName} записан`);
    };

        const ev = events.find(e => e.id == eventId);
        if (!ev || ev.creator !== getCurrentDirectorName()) { alert('Удалять можно только свои мероприятия'); return; }
        if (confirm('Удалить?')) { events = events.filter(e => e.id != eventId); saveEventsToStorage(); renderEvents(); }

    function renderEvents() {

        let html = '';
        events.forEach(ev => {
            const isCreator = (ev.creator === getCurrentDirectorName());
            html += `<div class="event-card"><h3>${escapeHtml(ev.title)}</h3><div class="date">📅 ${escapeHtml(ev.date)}</div><p>${escapeHtml(ev.description)}</p><div>👥 Записалось: ${ev.registrations.length} / ${ev.max}</div><div>👤 Организатор: ${escapeHtml(ev.creator)} (${escapeHtml(ev.creatorSchool)})</div>`;
            if (ev.registrations.length) {
                html += `<div><strong>Записавшиеся:</strong><ul>${ev.registrations.map(r => `<li>${escapeHtml(r.employeeName)} (${escapeHtml(r.position)}) — ${escapeHtml(r.schoolName)}</li>`).join('')}</ul></div>`;

            html += `<div style="margin-top:12px;">${!isCreator ? `<button onclick="registerForEvent(${ev.id})">📝 Записать сотрудника</button>` : ''}${isCreator ? `<button onclick="deleteEvent(${ev.id})" style="background:#ff4757;">🗑 Удалить</button>` : ''}</div></div>`;
        });
        container.innerHTML = html;
    }

            strengthsDetailed: p.strengths ? p.strengths.map(st => ({ name: st.name, val: st.val })) : [],
            skillsDetailed: p.skills ? p.skills.map(sk => ({ name: sk.name, level: sk.level })) : [],
            uniqueExperience: p.experience || 'Не указано',

    let currentSearchTerm = '';
    function directorMatchesSearch(d, term) {
        if (!term) return true;
        const t = term.toLowerCase();
        const fields = [d.name, d.school, d.city, d.useful, d.wantToKnow, d.uniqueExperience, ...(d.personalInterests || []), ...(d.tags || []), ...(d.strengthsDetailed || []).map(s => s.name), ...(d.skillsDetailed || []).map(s => s.name)].map(f => (f || '').toLowerCase());
        return fields.some(f => f.includes(t));
    }

        if (!filtered.length) { container.innerHTML = '<div>Ничего не найдено</div>'; return; }

        filtered.forEach(d => {
            const allTags = [...(d.strengthsDetailed || []).map(s => s.name), ...(d.skillsDetailed || []).map(s => s.name)].slice(0,5);
            html += `<div class="director-card"><div class="card-header"><div class="avatar">${d.name.charAt(0)}</div><div class="card-title"><h3>${escapeHtml(d.name)}</h3><p>🏫 ${escapeHtml(d.school)} • ${escapeHtml(d.city)} ${d.isMentor ? '<span class="badge-mentor">✨ Наставник</span>' : ''}</p></div></div><div class="info-section"><h4>🤝 Могу быть полезен</h4><p>${escapeHtml(d.useful)}</p></div><div class="info-section"><h4>💡 Хочу узнать</h4><p>${escapeHtml(d.wantToKnow)}</p></div>${allTags.length ? `<div class="tags">${allTags.map(t => `<span class="tag">${escapeHtml(t)}</span>`).join('')}</div>` : ''}<button class="contact-btn" onclick="alert('Связаться с ${escapeHtml(d.name)} можно через платформу')">💬 Связаться</button><button class="detail-btn" onclick="showDirectorDetail(${JSON.stringify(d).replace(/"/g, '&quot;')})">📖 Подробнее</button></div>`;
        });
        container.innerHTML = html;
    }
    window.showDirectorDetail = function(d) {
        alert(`Подробная карточка ${d.name} будет доступна в следующей версии`);
    };
    document.getElementById('directorSearchInput')?.addEventListener('input', (e) => { currentSearchTerm = e.target.value; renderDirectors(); });

    function renderMentors() {
        const container = document.getElementById('mentorsList');
        const all = [...demoDirectors];
        const mentors = all.filter(d => d.isMentor === true);
        container.innerHTML = mentors.map(m => `<div class="mentor-card" style="background:rgba(255,255,255,0.1); border-radius:15px; padding:15px; margin-bottom:15px; display:flex; justify-content:space-between; align-items:center;"><div><strong>${escapeHtml(m.name)}</strong><div style="font-size:0.9rem;">${escapeHtml(m.school)}</div><div style="font-size:0.8rem;">${escapeHtml(m.useful)}</div></div><span class="badge" style="background:#00c6ff; padding:5px 10px; border-radius:20px;">Наставник</span></div>`).join('');
    }

    // Инициализация
    document.getElementById('loginBtn').onclick = showLoginModal;
    document.getElementById('registerBtn').onclick = showRegisterModal;
    document.getElementById('logoutBtn').onclick = logout;
    document.getElementById('createEventBtn')?.addEventListener('click', () => {
        const title = document.getElementById('eventTitle').value.trim();
        const date = document.getElementById('eventDate').value.trim();
        const desc = document.getElementById('eventDesc').value.trim();
        const max = document.getElementById('eventMax').value;
        if (!title || !date || !desc) { alert('Заполните все поля'); return; }
        createEvent(title, date, desc, max);
        document.getElementById('eventTitle').value = '';
        document.getElementById('eventDate').value = '';
        document.getElementById('eventDesc').value = '';
        document.getElementById('eventMax').value = '';
    });

    if (localStorage.getItem('userLoggedIn') === 'true') {
        showMainApp();
    } else {
        document.getElementById('splashScreen').style.display = 'flex';
    }
    loadEventsFromStorage();
    window.renderMentors = renderMentors;
    setTimeout(() => renderMentors(), 100);
</script>
</body>
</html>
